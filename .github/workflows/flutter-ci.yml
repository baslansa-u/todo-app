name: Flutter CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: actions/checkout@v5
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev xvfb

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Check formatting
        run: dart format --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test test

      - name: Integration tests
        run: xvfb-run -a flutter test integration_test -d linux
