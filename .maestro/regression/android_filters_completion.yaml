appId: com.example.todo_app
name: Regression - completion filters
---
- runFlow: ../helpers/launch_android.yaml
- runFlow: ../helpers/add_read_release_notes.yaml
- runFlow: ../helpers/complete_read_release_notes.yaml
- tapOn: "Completed"
- assertVisible: "Read release notes\nCheck QA scope"
- tapOn: "Active"
- assertVisible: "No todo"
- tapOn: "All"
- assertVisible: "Read release notes\nCheck QA scope"
